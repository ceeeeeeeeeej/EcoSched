name: Deploy Admin Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'Admin_Dashboard/Admin_Dashboard/Admin_Dashboard/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'Admin_Dashboard/Admin_Dashboard/Admin_Dashboard/package-lock.json'

      - name: Install Dependencies
        run: npm install
        working-directory: Admin_Dashboard/Admin_Dashboard/Admin_Dashboard

      - name: Build Dashboard
        run: npm run build
        working-directory: Admin_Dashboard/Admin_Dashboard/Admin_Dashboard

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Admin_Dashboard/Admin_Dashboard/Admin_Dashboard/dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
