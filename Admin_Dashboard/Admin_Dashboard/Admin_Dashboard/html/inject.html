<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Inject Bin Data</title>
</head>

<body>
    <h2>Injecting BIN-1189 Data with location_lat...</h2>
    <div id="output" style="font-family: monospace;"></div>

    <script>
        const url = 'https://bfqktqtsjchbmopafgzf.supabase.co/rest/v1/bins';
        const apikey = 'sb_publishable_ucEKoeLHhbxBVtzDABvVIg_eKIhIQ31';

        async function run() {
            const out = document.getElementById('output');
            out.innerHTML += 'Sending POST request...<br>';

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'apikey': apikey,
                        'Authorization': 'Bearer ' + apikey,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        bin_id: 'BIN-1189',
                        address: 'Main Campus Gate',
                        fill_level: 0,
                        status: 'active',
                        location_lat: 9.0104,
                        location_lng: 126.148
                    })
                });

                const data = await res.text();
                out.innerHTML += 'Status: ' + res.status + '<br>';
                out.innerHTML += 'Response: ' + data + '<br>';

                if (res.ok) {
                    out.innerHTML += '<h3 style="color: green;">SUCCESS! You can close this page and check the Admin Dashboard.</h3>';
                }
            } catch (e) {
                out.innerHTML += '<span style="color: red;">ERROR: ' + e + '</span><br>';
            }
        }

        run();
    </script>
</body>

</html>
