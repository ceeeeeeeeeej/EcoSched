<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSched Admin Registration</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/landing.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Registration Screen -->
    <div id="registrationScreen" class="hero">
        <!-- Hero Background -->
        <div class="hero-background">
            <div class="hero-overlay"></div>
            <div class="floating-elements">
                <div class="floating-leaf leaf-1"></div>
                <div class="floating-leaf leaf-2"></div>
                <div class="floating-leaf leaf-3"></div>
                <div class="recycling-symbol symbol-1"></div>
                <div class="recycling-symbol symbol-2"></div>
            </div>
        </div>

        <!-- Registration Panel -->
        <div class="hero-content">
            <div class="glass-panel registration-panel">
                <div class="panel-header">
                    <div class="nav-logo">
                        <img src="../assets/image/logo/logo1.png" alt="EcoSched Logo" class="logo-image">
                        <span class="logo-text">EcoSched</span>
                    </div>
                    <h1 class="panel-title">Join EcoSched Admin</h1>
                    <p class="panel-subtitle">Create your account to access the waste management dashboard</p>
                </div>

                <form id="registrationForm" class="eco-form">
                    <div class="form-group">
                        <label class="field-label">Full Name</label>
                        <div class="input-field">
                            <input type="text" id="regFullName" name="fullName" placeholder="Enter your full name"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="field-label">Email Address</label>
                        <div class="input-field">
                            <input type="email" id="regEmail" name="email" placeholder="admin@gmail.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="field-label">Create Password</label>
                        <div class="input-field">
                            <input type="password" id="regPassword" name="password" placeholder="Create Password"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="field-label">Confirm Password</label>
                        <div class="input-field">
                            <input type="password" id="regConfirmPassword" name="confirmPassword"
                                placeholder="Confirm Password" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="form-options">
                            <label class="remember-checkbox">
                                <input type="checkbox" id="regTerms" required>
                                <span class="checkmark"></span>
                                <span class="checkbox-text">I agree to the <a href="#" class="terms-link"
                                        onclick="openTermsAndPrivacy()">Terms of Service</a> and <a href="#"
                                        class="privacy-link" onclick="openTermsAndPrivacy()">Privacy Policy</a></span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="eco-button register-button">
                        <span>Join Circular Economy</span>
                        <div class="recycling-icon">
                            <i class="fas fa-recycle"></i>
                        </div>
                    </button>

                    <div class="existing-account">
                        <p>Already have an account? <a href="login.html" class="eco-link">Log In</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase services
        import { authService, dbService, utils } from '../config/supabase_config.js?v=2.0';

        // Registration-specific functionality
        document.addEventListener('DOMContentLoaded', function () {
            console.log('Registration page loaded');

            // Initialize registration form
            const registrationForm = document.getElementById('registrationForm');
            if (registrationForm) {
                console.log('Registration form found');

                // Add form submission handler
                registrationForm.addEventListener('submit', handleRegistration);

                // Add real-time validation
                const formFields = registrationForm.querySelectorAll('input, select');
                formFields.forEach(field => {
                    field.addEventListener('blur', validateField);
                });

                // Password strength checking
                const passwordField = document.getElementById('regPassword');
                if (passwordField) {
                    passwordField.addEventListener('input', checkPasswordStrength);
                }
            } else {
                console.error('Registration form not found');
            }
        });

        // Handle registration form submission
        async function handleRegistration(e) {
            e.preventDefault();
            console.log('Registration form submitted');

            const formData = new FormData(e.target);
            const userData = {
                fullName: formData.get('fullName'),
                email: formData.get('email'),
                password: formData.get('password'),
                confirmPassword: formData.get('confirmPassword')
            };

            console.log('Registration data:', userData);

            // Enhanced validation
            if (!validateRegistrationForm(userData)) {
                return;
            }

            // Show loading state
            const submitBtn = document.querySelector('.register-button');
            if (submitBtn) {
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Creating Account...</span>';
            }

            try {
                // Load global settings to determine if admin approval is required
                let adminApprovalRequired = true; // Default to TRUE - all new accounts require approval
                try {
                    if (dbService && dbService.getSystemSettings) {
                        const { data, error } = await dbService.getSystemSettings();
                        if (!error && data && data.adminApprovalRequired !== undefined) {
                            adminApprovalRequired = !!data.adminApprovalRequired;
                        }
                    }
                } catch (settingsError) {
                    console.warn('Could not load system settings, defaulting adminApprovalRequired=true:', settingsError);
                }

                // Prepare user data for Firebase
                // SECURITY: All public registrations MUST require approval
                const firebaseUserData = {
                    firstName: userData.fullName.split(' ')[0] || userData.fullName,
                    lastName: userData.fullName.split(' ').slice(1).join(' ') || '',
                    fullName: userData.fullName,
                    phone: '', // Not collected in this form
                    organization: 'EcoSched Admin',
                    faction: 'municipal', // Default to municipal for admin accounts
                    serviceArea: 'General',
                    role: 'admin', // Public registrations are always 'admin' role (not superadmin)
                    requiresAdminApproval: true // FORCE approval requirement
                };

                console.log('Creating Firebase account with data:', firebaseUserData);
                console.log('🔒 SECURITY: Public registration - forcing pending_approval status');

                // Create Firebase account
                const result = await authService.signUp(userData.email, userData.password, firebaseUserData);

                if (result.error) {
                    throw result.error;
                }

                console.log('Firebase account created successfully:', result.user);

                // Show success message
                if (submitBtn) {
                    submitBtn.innerHTML = '<i class="fas fa-check"></i><span>Account Created!</span>';
                    submitBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                }

                // Show success notification
                showRegistrationSuccess('Account created successfully! Your account is awaiting admin approval.');

                // Redirect to login page after success
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);

            } catch (error) {
                console.error('Registration error:', error);

                // Get user-friendly error message
                const errorMessage = utils.getErrorMessage ? utils.getErrorMessage(error) : error.message || 'Registration failed';

                // Show error message
                if (submitBtn) {
                    submitBtn.innerHTML = '<i class="fas fa-times"></i><span>Registration Failed</span>';
                    submitBtn.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';

                    // Reset button after 3 seconds
                    setTimeout(() => {
                        submitBtn.innerHTML = '<span>Create Admin Account</span><div class="water-drop-icon"><i class="fas fa-tint"></i></div>';
                        submitBtn.style.background = '';
                        submitBtn.classList.remove('loading');
                        submitBtn.disabled = false;
                    }, 3000);
                }

                // Show error notification
                showRegistrationError(errorMessage);
            }
        }

        // Validate registration form
        function validateRegistrationForm(userData) {
            let isValid = true;

            // Clear previous validation states
            clearValidationStates();

            // Validate full name
            if (!userData.fullName || userData.fullName.trim().length < 2) {
                showFieldError('regFullName', 'Full name must be at least 2 characters');
                isValid = false;
            } else if (!/^[a-zA-Z\s]+$/.test(userData.fullName)) {
                showFieldError('regFullName', 'Full name can only contain letters and spaces');
                isValid = false;
            }

            // Validate email
            if (!userData.email) {
                showFieldError('regEmail', 'Please enter a valid email address');
                isValid = false;
            } else {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(userData.email)) {
                    showFieldError('regEmail', 'Please enter a valid email address');
                    isValid = false;
                }
            }

            // Enhanced password validation
            if (!userData.password) {
                showFieldError('regPassword', 'Password is required');
                isValid = false;
            } else if (userData.password.length < 8) {
                showFieldError('regPassword', 'Password must be at least 8 characters');
                isValid = false;
            }

            // Validate password confirmation
            if (!userData.confirmPassword) {
                showFieldError('regConfirmPassword', 'Please confirm your password');
                isValid = false;
            } else if (userData.password !== userData.confirmPassword) {
                showFieldError('regConfirmPassword', 'Passwords do not match');
                isValid = false;
            }

            // Validate terms agreement
            const termsCheckbox = document.getElementById('regTerms');
            if (!termsCheckbox.checked) {
                showFieldError('regTerms', 'You must agree to the terms and conditions');
                isValid = false;
            }

            return isValid;
        }

        // Show field error
        function showFieldError(fieldId, message) {
            const field = document.getElementById(fieldId);
            const formGroup = field.closest('.form-group');

            formGroup.classList.add('error');
            formGroup.classList.remove('success');

            // Remove existing error message
            const existingError = formGroup.querySelector('.error-message');
            if (existingError) {
                existingError.remove();
            }

            // Add error message
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            formGroup.appendChild(errorDiv);
        }

        // Clear validation states
        function clearValidationStates() {
            const formGroups = document.querySelectorAll('.form-group');
            formGroups.forEach(group => {
                group.classList.remove('error', 'success');
                const errorMessage = group.querySelector('.error-message');
                if (errorMessage) {
                    errorMessage.remove();
                }
            });
        }

        // Validate individual field
        function validateField(e) {
            const field = e.target;
            const fieldId = field.id;
            const value = field.value.trim();

            // Clear previous validation
            const formGroup = field.closest('.form-group');
            formGroup.classList.remove('error', 'success');

            const existingError = formGroup.querySelector('.error-message');
            if (existingError) {
                existingError.remove();
            }

            let isValid = true;
            let errorMessage = '';

            // Field-specific validation
            switch (fieldId) {
                case 'regFullName':
                    if (value.length < 2) {
                        isValid = false;
                        errorMessage = 'Must be at least 2 characters';
                    } else if (!/^[a-zA-Z\s]+$/.test(value)) {
                        isValid = false;
                        errorMessage = 'Name can only contain letters and spaces';
                    }
                    break;

                case 'regEmail':
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (value && !emailRegex.test(value)) {
                        isValid = false;
                        errorMessage = 'Please enter a valid email address';
                    }
                    break;

                case 'regPassword':
                    if (value && value.length < 8) {
                        isValid = false;
                        errorMessage = 'Password must be at least 8 characters';
                    }
                    break;

                case 'regConfirmPassword':
                    const password = document.getElementById('regPassword').value;
                    if (value && value !== password) {
                        isValid = false;
                        errorMessage = 'Passwords do not match';
                    }
                    break;
            }

            // Show validation result
            if (value && isValid) {
                formGroup.classList.add('success');
            } else if (value && !isValid) {
                formGroup.classList.add('error');
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message'; l
                errorDiv.textContent = errorMessage;
                formGroup.appendChild(errorDiv);
            }
        }

        // Check password strength
        function checkPasswordStrength(e) {
            const password = e.target.value;
            const strengthIndicator = document.getElementById('passwordStrength');

            if (!strengthIndicator) return;

            // Simple password validation
            const validation = {
                score: [password.length >= 8, /[A-Z]/.test(password), /[a-z]/.test(password), /\d/.test(password)].filter(Boolean).length,
                strength: {
                    length: password.length >= 8,
                    uppercase: /[A-Z]/.test(password),
                    lowercase: /[a-z]/.test(password),
                    numbers: /\d/.test(password)
                }
            };

            // Update strength indicator
            let strengthClass = '';
            if (password.length === 0) {
                strengthClass = '';
            } else if (validation.score <= 2) {
                strengthClass = 'weak';
            } else if (validation.score === 3) {
                strengthClass = 'fair';
            } else if (validation.score === 4) {
                strengthClass = 'good';
            } else {
                strengthClass = 'strong';
            }

            strengthIndicator.className = `password-strength ${strengthClass}`;
        }

        // Show registration success notification
        function showRegistrationSuccess(message) {
            // Create success notification
            const notification = document.createElement('div');
            notification.className = 'registration-notification success';
            notification.innerHTML = `
                <div class="notification-content">
                    <i class="fas fa-check-circle"></i>
                    <span>${message}</span>
                </div>
            `;

            // Add to page
            document.body.appendChild(notification);

            // Show notification
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);

            // Remove notification after 5 seconds
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 5000);
        }

        // Show registration error notification
        function showRegistrationError(message) {
            // Create error notification
            const notification = document.createElement('div');
            notification.className = 'registration-notification error';
            notification.innerHTML = `
                <div class="notification-content">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>${message}</span>
                </div>
            `;

            // Add to page
            document.body.appendChild(notification);

            // Show notification
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);

            // Remove notification after 5 seconds
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 5000);
        }

        // Open terms and privacy modal
        function openTermsAndPrivacy() {
            alert('Terms of Service and Privacy Policy would be displayed here.');
        }
    </script>
</body>

</html>
