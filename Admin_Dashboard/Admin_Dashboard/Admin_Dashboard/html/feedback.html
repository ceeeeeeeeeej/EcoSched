<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Feedback - EcoSched Admin</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/feedback.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <div class="header-left">
                <h1 class="page-title">
                    <i class="fas fa-comments"></i>
                    Resident Feedback
                </h1>
                <p class="page-subtitle">Review feedback from residents by barangay and service area</p>
            </div>
        </div>

        <div class="filters-container">
            <div class="filters-row">
                <div class="filter-group">
                    <label>Search Feedback</label>
                    <div class="search-input">
                        <i class="fas fa-search"></i>
                        <input type="text" id="feedbackSearch" placeholder="Search by title, message, resident, or barangay...">
                    </div>
                </div>
                <div class="filter-group">
                    <label>Priority</label>
                    <select class="filter-select" id="priorityFilter">
                        <option value="">All Priorities</option>
                        <option value="urgent">Urgent</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Status</label>
                    <select class="filter-select" id="statusFilter">
                        <option value="">All Status</option>
                        <option value="new">New</option>
                        <option value="in_progress">In Progress</option>
                        <option value="resolved">Resolved</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Service Area</label>
                    <select class="filter-select" id="areaFilter">
                        <option value="">All Areas</option>
                        <option value="victoria">Victoria</option>
                        <option value="dayo-an">Dayo-An</option>
                    </select>
                </div>
                <div class="filter-group">
                    <button class="btn btn-secondary" onclick="resetFeedbackFilters()">
                        <i class="fas fa-undo"></i>
                        Reset
                    </button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-info">
                    <span id="feedbackCount">0 feedback items</span>
                </div>
                <div class="table-stats">
                    <span id="unreadFeedbackCount">0 unread</span>
                    <span class="divider">|</span>
                    <span id="urgentFeedbackCount">0 urgent/high</span>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="data-table" id="feedbackTable">
                    <thead>
                        <tr>
                            <th>Feedback</th>
                            <th>Resident / Barangay</th>
                            <th>Priority</th>
                            <th>Service Area</th>
                            <th>Status</th>
                            <th>Created At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="feedbackTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/feedback.js"></script>
</body>
</html>
