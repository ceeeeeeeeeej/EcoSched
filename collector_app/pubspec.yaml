name: collector_app
description: "EcoSched Collector App: Dedicated application for waste collection personnel"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8

  # Backend & Database
  supabase_flutter: ^2.0.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # IoT & Communication
  mqtt_client: ^10.0.0
  flutter_background_service: ^5.0.1

  # Push Notifications (Transitioned to Supabase Realtime)
  flutter_local_notifications: ^18.0.1

  # Maps & Location
  google_maps_flutter: ^2.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0

  # Charts & Analytics
  fl_chart: ^0.68.0

  # State Management
  provider: ^6.0.0

  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.0.0
  http: ^1.1.0

  # Additional Modern Dependencies
  flutter_svg: ^2.0.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  connectivity_plus: ^6.0.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
  url_launcher: ^6.2.0
  package_info_plus: ^9.0.0
  device_info_plus: ^10.0.0
  google_generative_ai: ^0.4.7
  flutter_markdown: ^0.6.14
  image_picker: ^1.2.0
  camera: ^0.11.2
  google_fonts: ^6.1.0
  #navigation bar
  google_nav_bar: ^5.0.6
  curved_navigation_bar: ^1.0.0

  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.11.1
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
